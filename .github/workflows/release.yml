name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            binary: dsg
          - target: x86_64-apple-darwin
            os: macos-13
            binary: dsg
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            binary: dsg
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            binary: dsg.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --manifest-path dsg/Cargo.toml

      - name: Package binary as versioned tar.gz
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="dsg/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ARCHIVE="dsg-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "$(dirname "${SRC}")" "$(basename "${SRC}")"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
