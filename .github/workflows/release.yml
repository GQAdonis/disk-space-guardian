name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            binary: dsg
            artifact: dsg-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-13
            binary: dsg
            artifact: dsg-x86_64-apple-darwin
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            binary: dsg
            artifact: dsg-x86_64-unknown-linux-musl
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            binary: dsg.exe
            artifact: dsg-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --manifest-path dsg/Cargo.toml

      - name: Rename binary
        shell: bash
        run: |
          SRC="dsg/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          cp "$SRC" "${{ matrix.artifact }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
